name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install test dependencies
        # 仅安装单元测试所需依赖（markdown/pygments 渲染 + reportlab/python-docx 导出）。
        # streamlit/requests 仅 dashboard.py 使用、测试不导入；Pillow 由 reportlab 间接带入、
        # 代码未直接引用，故均不显式安装以保持 CI 轻量稳定。
        run: |
          python -m pip install \
            markdown==3.5.2 \
            pygments==2.17.2 \
            reportlab==4.0.9 \
            python-docx==1.1.0 \
            pytest==8.0.0

      - name: Run tests
        # 仓库无 pytest 配置（无 --cov-fail-under 等覆盖率门槛），用 -o addopts="" 兜底。
        run: python -m pytest tests/ -o addopts="" -v
